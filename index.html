<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="quiz-container">

    <!-- Top Bar -->
    <div class="top-bar">
        <div class="progress">Question 1 / 10</div>
        <div class="timer">⏱ 30s</div>
    </div>

    <!-- Question -->
    <div class="question-box">
        <h2 id="question">What does HTML stand for?</h2>
    </div>

    <!-- Options -->
    <div class="options">
        <label><input type="radio" name="answer"> Hyper Text Markup Language</label>
        <label><input type="radio" name="answer"> High Text Machine Language</label>
        <label><input type="radio" name="answer"> Hyper Tool Multi Language</label>
        <label><input type="radio" name="answer"> None of these</label>
    </div>

    <!-- Button -->
    <button class="next-btn">Next</button>

</div>
<script src="app.js"></script>
</body>
</html>
